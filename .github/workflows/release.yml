name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Bundle Bun runtime into installer
        shell: pwsh
        run: |
          $bunExe = (Get-Command bun).Source
          Copy-Item $bunExe electron\bun.exe
          Write-Host "Bundled bun from $bunExe ($('{0:N0}' -f (Get-Item electron\bun.exe).Length) bytes)"

      - name: Install dependencies
        run: bun install

      - name: Build installer
        run: bun run app:publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
