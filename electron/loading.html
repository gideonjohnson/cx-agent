<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }
    body {
      background: #0d0f14;
      color: #e2e8f0;
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
      -webkit-app-region: drag;
    }
    .icon {
      font-size: 38px;
      margin-bottom: 18px;
      opacity: 0.9;
    }
    h1 {
      font-size: 19px;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }
    #status {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 28px;
      min-height: 18px;
    }
    .bar-track {
      width: 220px;
      height: 3px;
      background: #1e2330;
      border-radius: 99px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      border-radius: 99px;
      animation: slide 1.4s ease-in-out infinite;
    }
    @keyframes slide {
      0%   { transform: translateX(-120%) }
      50%  { transform: translateX(80%) }
      100% { transform: translateX(260%) }
    }
    .version {
      position: absolute;
      bottom: 16px;
      font-size: 11px;
      color: #2d3748;
    }
  </style>
</head>
<body>
  <div class="icon">🎧</div>
  <h1>CX Agent</h1>
  <p id="status">Starting up...</p>
  <div class="bar-track"><div class="bar-fill"></div></div>
  <span class="version">v1.2.0</span>
</body>
</html>
